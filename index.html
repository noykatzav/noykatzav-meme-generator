<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/main.css">
    <title>Meme Generator</title>                                 
</head>
<body onload="onInit()">
    <header>Meme Generator
        <button class="toggle-view" onclick="onToggleSections()">Editor</button>
    </header>
    <section class="editor hidden">
        <div class="canvas-container">            
            <canvas height="400"></canvas>
            <a href="#" class="download-meme" onclick="onDownloadMeme(this)" download="my-meme.jpg">Download Meme</a>
        </div>
        
        <div class="meme-editor">
            <input type="text" class="txt-edit" placeholder="Meme text" oninput="handleTxtEdit(event)">
        </div>
        
    </section>  
    
    <section class="gallery">
    </section> 

    <script src="js/services/util.service.js"></script>
    <script src="js/services/image.service.js"></script>
    <script src="js/services/meme.service.js"></script>
    <script src="js/meme.controller.js"></script>
    <script src="js/gallery.controller.js"></script>
    
    <script>
        function onToggleSections() {
            var elGalleryToggle = document.querySelector('.gallery').classList.toggle('hidden')
            var elEditorToggle = document.querySelector('.editor').classList.toggle('hidden')
            const elToggleView = document.querySelector('.toggle-view')
            
            if (elGalleryToggle) elToggleView.innerText = 'Gallery'
            else if (elEditorToggle) elToggleView.innerText = 'Editor'
        }
    </script>


</body>
</html>
